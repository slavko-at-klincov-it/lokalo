<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Beat 2 — Das Versprechen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: linear-gradient(180deg, #050a18 0%, #0a1028 50%, #02050f 100%);
    font-family: -apple-system, system-ui, sans-serif;
    color: rgba(255,255,255,0.86);
  }
  body { position: relative; }

  /* Single ambient particle drifting in the background — motion continuity from Beat 1 */
  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .root {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 32px;
    transition: opacity 0.6s ease-out;
  }

  .headline {
    font-size: 26px;
    font-weight: 300;
    line-height: 1.4;
    text-align: center;
    letter-spacing: 0.2px;
    margin-bottom: 56px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 1.0s ease-out, transform 1.0s ease-out;
  }
  .headline.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .headline strong {
    font-weight: 400;
  }

  .promises {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    margin-bottom: 64px;
  }
  .promise {
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.2px;
    color: rgba(255,255,255,0.78);
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.7s ease-out, transform 0.7s ease-out;
  }
  .promise.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .button {
    display: inline-block;
    padding: 14px 32px;
    border: 1px solid rgba(255,255,255,0.30);
    border-radius: 100px;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.92);
    background: transparent;
    cursor: pointer;
    opacity: 0;
    transform: translateY(8px);
    transition:
      opacity 0.8s ease-out,
      transform 0.8s ease-out,
      background 0.2s ease,
      border-color 0.2s ease;
  }
  .button.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .button:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.55);
  }
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="root" id="root">
  <div class="headline" id="headline">
    Alles bleibt<br><strong>auf deinem iPhone.</strong>
  </div>
  <div class="promises">
    <div class="promise" id="p1">Läuft auf dem Gerät.</div>
    <div class="promise" id="p2">Kein Lokalo-Backend.</div>
    <div class="promise" id="p3">Keine Werbung.</div>
    <div class="promise" id="p4">Keine Telemetrie.</div>
  </div>
  <button class="button" id="btn">Verstanden</button>
</div>

<script>
// Ambient particle in the background — three slow drifting points to keep motion alive
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  ctx.scale(dpr, dpr);
}
resize();
const W = window.innerWidth, H = window.innerHeight;

const dots = Array.from({length: 12}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  vx: (Math.random() - 0.5) * 0.15,
  vy: (Math.random() - 0.5) * 0.15,
  r: 1 + Math.random() * 1.5,
  opacity: 0.15 + Math.random() * 0.25
}));

function loop() {
  ctx.clearRect(0, 0, W, H);
  for (const d of dots) {
    d.x += d.vx;
    d.y += d.vy;
    if (d.x < 0 || d.x > W) d.vx *= -1;
    if (d.y < 0 || d.y > H) d.vy *= -1;
    ctx.fillStyle = `rgba(255,255,255,${d.opacity})`;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fill();
  }
  requestAnimationFrame(loop);
}
loop();

// Choreography
const headline = document.getElementById('headline');
const p1 = document.getElementById('p1');
const p2 = document.getElementById('p2');
const p3 = document.getElementById('p3');
const p4 = document.getElementById('p4');
const btn = document.getElementById('btn');
const root = document.getElementById('root');

setTimeout(() => headline.classList.add('visible'),  300);
setTimeout(() => p1.classList.add('visible'), 1300);
setTimeout(() => p2.classList.add('visible'), 1700);
setTimeout(() => p3.classList.add('visible'), 2100);
setTimeout(() => p4.classList.add('visible'), 2500);
setTimeout(() => btn.classList.add('visible'), 3300);

btn.addEventListener('click', () => {
  root.style.opacity = '0';
});
</script>
</body>
</html>
