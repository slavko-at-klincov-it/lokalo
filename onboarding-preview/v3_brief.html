<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>V3 — Brief von daheim</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: linear-gradient(135deg, #f5ede0 0%, #e8d9bd 100%);
    font-family: -apple-system, system-ui, sans-serif;
  }
  body {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Subtle paper grain */
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(120, 80, 40, 0.06) 1px, transparent 1px),
      radial-gradient(circle at 60% 70%, rgba(120, 80, 40, 0.06) 1px, transparent 1px),
      radial-gradient(circle at 80% 20%, rgba(120, 80, 40, 0.04) 1px, transparent 1px),
      radial-gradient(circle at 40% 80%, rgba(120, 80, 40, 0.04) 1px, transparent 1px);
    background-size: 60px 60px, 80px 80px, 100px 100px, 120px 120px;
    mix-blend-mode: multiply;
    pointer-events: none;
  }
  .root {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: rootOut 0.4s ease-out 11s forwards;
  }
  .paper {
    position: relative;
    width: 250px;
    height: 410px;
    background: #fcf8e8;
    border-radius: 4px;
    box-shadow:
      0 30px 60px rgba(0,0,0,0.20),
      0 8px 16px rgba(0,0,0,0.12);
    transform: translateX(700px) rotate(8deg);
    animation: slideIn 1.4s cubic-bezier(0.2, 0.8, 0.3, 1.05) 0.2s forwards, slideOut 0.9s ease-in 9.5s forwards;
    overflow: hidden;
  }
  /* Ruled lines */
  .paper::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 31px,
      rgba(140, 100, 90, 0.10) 32px,
      transparent 32px
    );
    background-position: 0 50px;
    pointer-events: none;
  }
  /* Top edge dashes */
  .paper::after {
    content: '';
    position: absolute;
    top: 14px;
    left: 12px;
    right: 12px;
    height: 1px;
    background: repeating-linear-gradient(
      to right,
      rgba(120, 80, 50, 0.25) 0,
      rgba(120, 80, 50, 0.25) 8px,
      transparent 8px,
      transparent 14px
    );
  }
  .text {
    position: absolute;
    top: 56px;
    left: 32px;
    right: 32px;
    bottom: 32px;
    font-family: "Caveat", "Bradley Hand", cursive;
    font-weight: 500;
    font-size: 22px;
    color: #2a2228;
    line-height: 1.5;
    white-space: pre-line;
  }
  @keyframes slideIn {
    to { transform: translateX(0) rotate(-2deg); }
  }
  @keyframes slideOut {
    to { transform: translateX(-800px) rotate(-10deg); }
  }
  @keyframes rootOut {
    to { opacity: 0; }
  }
</style>
</head>
<body>
<div class="root">
  <div class="paper">
    <div class="text" id="text"></div>
  </div>
</div>

<script>
const letter = `Hi.

Lokalo läuft komplett
auf deinem iPhone.

Läuft auf dem Gerät.
Kein Lokalo-Backend.
Keine Werbung.

Falls dir das auch
wichtig ist —
los geht's.

— S.`;

const el = document.getElementById('text');
let i = 0;
function step() {
  if (i <= letter.length) {
    el.textContent = letter.slice(0, i);
    i++;
    // organic typing speed
    const delay = 50 + Math.random() * 35;
    setTimeout(step, delay);
  }
}
// Start typing after slide-in completes
setTimeout(step, 700);
</script>
</body>
</html>
