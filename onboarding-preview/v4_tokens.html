<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>V4 — Tokens</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #0c0e12 0%, #000 70%);
    font-family: "JetBrains Mono", "SF Mono", Menlo, monospace;
  }
  body { position: relative; }
  .root {
    width: 100%;
    height: 100%;
    position: relative;
    transition: opacity 0.9s ease-out;
  }
  .token {
    position: absolute;
    color: white;
    background: rgba(255,255,255,0.04);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
    text-shadow: 0 0 8px rgba(255,255,255,0.20);
  }
  .title {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.85);
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 56px;
    font-weight: 900;
    background: linear-gradient(180deg, #fff 0%, #b8b8b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -2px;
    opacity: 0;
    transition: opacity 0.7s ease-out, transform 0.7s cubic-bezier(0.2, 0.8, 0.3, 1.2);
  }
  .title.visible {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  .subtitle {
    position: absolute;
    top: 60%;
    left: 50%;
    transform: translate(-50%, 0);
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 0.8s ease-out;
  }
  .subtitle.visible { opacity: 1; }
</style>
</head>
<body>
<div class="root" id="root">
  <div class="title" id="title">Lokalo</div>
  <div class="subtitle" id="subtitle">tokens bleiben hier.</div>
</div>

<script>
const root = document.getElementById('root');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');

const tokenPool = [
  "Hal", "lo", " auf", " dei", "nem", " iPh", "one",
  " ohne", " Cloud", " ein", " lokal", "es", " Mo", "dell",
  " für", " dich", "Hi", " there", " no", " server",
  "•", "<|im_start|>", "<|eot_id|>", "<|end|>",
  "tokens", "_per_", "second", " 84", " stream", "ing",
  "Lo", "kal", "o", "•"
];

const W = window.innerWidth;
const H = window.innerHeight;

function spawnToken(delay) {
  setTimeout(() => {
    const el = document.createElement('div');
    el.className = 'token';
    el.textContent = tokenPool[Math.floor(Math.random() * tokenPool.length)];
    el.style.fontSize = (11 + Math.random() * 7) + 'px';
    el.style.left = (40 + Math.random() * (W - 80)) + 'px';
    el.style.top = (H + 30) + 'px';
    el.style.transition = 'top 2.0s linear, opacity 0.6s ease-out';
    root.appendChild(el);

    requestAnimationFrame(() => {
      el.style.top = '-30px';
      el.style.opacity = '0.85';
    });
    setTimeout(() => {
      el.style.opacity = '0';
    }, 700);
    setTimeout(() => {
      el.remove();
    }, 2200);
  }, delay);
}

// Spawn 70 tokens over 3.2 s
for (let i = 0; i < 70; i++) {
  spawnToken(i * 45);
}

// Title appears
setTimeout(() => {
  title.classList.add('visible');
  setTimeout(() => subtitle.classList.add('visible'), 400);
}, 3300);

// Dissolve
setTimeout(() => {
  root.style.opacity = '0';
}, 6500);
</script>
</body>
</html>
