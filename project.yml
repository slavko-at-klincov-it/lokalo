name: Lokal
options:
  bundleIdPrefix: com.slavkoklincov
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: de
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top
  generateEmptyDirectories: true
  xcodeVersion: "26.4"

packages:
  USearch:
    url: https://github.com/unum-cloud/usearch
    from: 2.21.0
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: 4.2.2
  MCP:
    url: https://github.com/modelcontextprotocol/swift-sdk
    from: 0.11.0

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEAD_CODE_STRIPPING: YES
    CLANG_ENABLE_MODULES: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    OTHER_LDFLAGS: -lc++

targets:
  Lokal:
    type: application
    platform: iOS
    sources:
      - path: Lokal
        excludes:
          - "**/.DS_Store"
          - "Resources/**"
      - path: Lokal/Resources
        buildPhase: resources
    resources:
      - path: Lokal/Assets.xcassets
        type: folder
    info:
      path: Lokal/Info.plist
      properties:
        CFBundleDisplayName: Lokalo
        CFBundleName: Lokalo
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "5"
        UILaunchScreen:
          UIColorName: ""
          UIImageRespectsSafeAreaInsets: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        BGTaskSchedulerPermittedIdentifiers:
          - com.slavkoklincov.lokal.ragindex
        UIBackgroundModes:
          - processing
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSMicrophoneUsageDescription: "Lokalo nutzt das Mikrofon für Sprachsteuerung und Diktat – dein Audio verlässt das Gerät nie."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            huggingface.co:
              NSIncludesSubdomains: true
              NSTemporaryExceptionAllowsInsecureHTTPLoads: false
              NSTemporaryExceptionMinimumTLSVersion: TLSv1.2
        CFBundleURLTypes:
          - CFBundleURLName: com.slavkoklincov.lokal.oauth
            CFBundleURLSchemes:
              - com.slavkoklincov.lokal
    # Entitlements for increased memory limit are commented out for the
    # initial TestFlight build because they require Apple to have approved
    # the App ID for the capability. Re-enable in Xcode → Signing & Capabilities
    # once the App ID exists in App Store Connect.
    # entitlements:
    #   path: Lokal/Lokal.entitlements
    #   properties:
    #     com.apple.developer.kernel.increased-memory-limit: true
    #     com.apple.developer.kernel.extended-virtual-addressing: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.slavkoklincov.lokal
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: SMPDFBGL64
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        CURRENT_PROJECT_VERSION: "5"
        MARKETING_VERSION: "1.0"
        FRAMEWORK_SEARCH_PATHS:
          - $(PROJECT_DIR)/Frameworks
        OTHER_LDFLAGS:
          - -lc++
          - -framework
          - Accelerate
          - -framework
          - Metal
          - -framework
          - MetalKit
          - -framework
          - Foundation
    dependencies:
      - framework: Frameworks/llama.xcframework
        embed: true
        codeSign: true
      - sdk: Accelerate.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - package: USearch
      - package: KeychainAccess
      - package: MCP

  LokalTests:
    type: bundle.unit-test
    platform: iOS
    sources: [LokalTests]
    dependencies:
      - target: Lokal
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Lokal.app/Lokal

  LokalUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [LokalUITests]
    dependencies:
      - target: Lokal
    settings:
      base:
        TEST_TARGET_NAME: Lokal
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: de.lokal.uitests
